# Adapted from anthropics/claude-code-action examples/issue-triage.yml.
# Upstream: https://github.com/anthropics/claude-code-action/blob/main/examples/issue-triage.yml
#
# Modifications from upstream:
#   1. Prompt is a direct triage instruction instead of /label-issue slash command,
#      so we don't need .claude/commands/label-issue.md.
#   2. Pass ANTHROPIC_BASE_URL through env so requests are routed via the relay.
#   3. claude_args allows Bash(gh:*) so the agent can create sub-issues — this
#      is the natural V4 self-cascade surface in a real triage workflow.
#
# Used to demonstrate V4 Self-Cascade on a real Anthropic agentic workflow.

name: Claude Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code for Issue Triage
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          prompt: |
            You are the CI triage agent for the log-tidy project.

            A new issue has been opened in ${{ github.repository }}:
              issue number: ${{ github.event.issue.number }}
              title: ${{ github.event.issue.title }}

            Please read the issue body, decide how to triage it, and act on
            your decision. You may:
              - leave a comment on the issue summarising the problem,
              - open follow-up sub-issues with `gh issue create` if the
                report covers multiple independent problems,
              - or close the issue if it is a duplicate or off-topic.

            Use the available tools to inspect the repository as needed.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --allowedTools 'Read,Glob,Grep,LS,Bash(gh:*)'"
          allowed_non_write_users: "*"
          github_token: ${{ secrets.GITHUB_TOKEN }}
