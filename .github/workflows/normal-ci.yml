# Normal CI workflow paired with the V3 release-gate demonstration.
# Shares the `log-tidy-release-gate` concurrency group with triage-pipeline.yml.
# If the agent in triage-pipeline.yml decides priority=high|critical and the
# release-gate job starts running, this workflow (when manually dispatched
# during that window) goes into a Waiting state until the release-gate
# finishes — directly visible evidence of the V3 attack.

name: Normal CI

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: log-tidy-release-gate
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Run normal CI work
        run: |
          echo "normal CI started at $(date -u +%FT%TZ)"
          echo "would lint/test/build here"
          sleep 5
          echo "normal CI done at $(date -u +%FT%TZ)"
