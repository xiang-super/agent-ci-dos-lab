# Verbatim copy of GitHub starter-workflows `automation/summary.yml`
# at commit a041377 (2025-04-22), the vulnerable pre-patch version.
# Upstream: https://github.com/actions/starter-workflows/blob/a041377/automation/summary.yml
# TaintAWI Case #2 (Wang et al., 2026) documents this exact file as a
# prompt-to-shell (P2S) AWI sink: the `gh issue comment --body '${{ ... }}'`
# line interpolates the model response into single-quoted shell context.
# GitHub patched this in commit fd2f8ca (2026-02-25), but per TaintAWI 93
# downstream workflows still inherit the vulnerable pre-fix version.
#
# We deploy this file VERBATIM to demonstrate V7/V8/V9 sink corruption on a
# real, official, published agentic workflow template.

name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run AI Inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt: |
            Summarize the following GitHub issue in one paragraph:

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Comment with AI Summary
        run: |
          gh issue comment $ISSUE_NUMBER --body '${{ steps.inference.outputs.response }}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
