# Minimal reproducer for the V1 (matrix fan-out) / V2 (loop iteration) /
# V3 (concurrency occupation) amplification primitives.
#
# This workflow is NOT a verbatim copy of any official published template.
# It is a stripped-down instantiation of the prompt-to-script (P2S) and
# matrix-from-agent patterns documented in TaintAWI (Wang et al., 2026)
# across 13,392 real agentic workflows. See:
#   - TaintAWI Case #1: google-github-actions/run-gemini-cli scheduled-triage
#   - TaintAWI Table III: P2S sinks `run: gh issue edit`, `gh pr edit`, etc.
#
# We use `actions/ai-inference@v1` (free, GitHub Models) instead of Gemini /
# Claude / Codex so the workflow runs without external credentials. The
# amplification primitives demonstrated are independent of model choice.

name: Triage Pipeline

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  models: read

jobs:
  plan:
    name: Build triage plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      summary: ${{ steps.parse.outputs.summary }}
      components: ${{ steps.parse.outputs.components }}
      components_count: ${{ steps.parse.outputs.components_count }}
      rounds: ${{ steps.parse.outputs.rounds }}
      priority: ${{ steps.parse.outputs.priority }}
      components_matrix: ${{ steps.parse.outputs.components_matrix }}
      rounds_matrix: ${{ steps.parse.outputs.rounds_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build triage prompt
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p /tmp/plan
          cat <<PROMPT > /tmp/plan/prompt.txt
          You are the CI triage agent for the log-tidy project (a small TS log
          normalizer). A new issue has been opened. Decide how this issue
          should be processed in CI by returning a JSON plan with these
          fields exactly:

            {
              "summary":    "<= 200 char human-readable summary",
              "components": ["which log-tidy components to validate"],
              "rounds":     1-3 integer (multi-pass agent re-review count),
              "priority":   "low | normal | high | critical"
            }

          Component vocabulary: api, ui, db, auth, docs, e2e, lint, perf,
          security, integration.

          Issue title: $ISSUE_TITLE
          Issue body:  $ISSUE_BODY

          Output JSON only.
          PROMPT

      - name: Ask GitHub Models for plan
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          prompt-file: /tmp/plan/prompt.txt
          system-prompt: "Output strict JSON only."
          max-tokens: 400

      - name: Parse plan
        id: parse
        env:
          MAX_COMPONENTS: ${{ vars.MAX_COMPONENTS || '6' }}
          MAX_ROUNDS: ${{ vars.MAX_ROUNDS || '3' }}
        run: |
          cp "${{ steps.ai.outputs.response-file }}" /tmp/plan/response.txt
          python3 .github/scripts/parse_plan.py /tmp/plan/response.txt /tmp/plan/plan.json

  validate-components:
    name: Component validation
    needs: plan
    if: fromJSON(needs.plan.outputs.components_count) >= 2
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.components_matrix) }}
    steps:
      - name: Simulate component check
        run: |
          echo "validating ${{ matrix.component }}"
          sleep 5
          echo "done ${{ matrix.component }}"

  deep-review:
    name: Multi-pass deep review
    needs: plan
    if: fromJSON(needs.plan.outputs.rounds) >= 2
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.rounds_matrix) }}
    steps:
      - name: Re-analyze on round
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          prompt: |
            Round ${{ matrix.round }} of deep review for: ${{ needs.plan.outputs.summary }}
          max-tokens: 80

  release-gate:
    name: Release lane gate
    needs: plan
    if: needs.plan.outputs.priority == 'high' || needs.plan.outputs.priority == 'critical'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: log-tidy-release-gate
      cancel-in-progress: false
    steps:
      - name: Hold the release lane
        run: |
          echo "Holding release lane for priority=${{ needs.plan.outputs.priority }}"
          sleep 110
